<html lang="en">

    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="https://base44.com/logo_v2.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap" rel="stylesheet" />
    <meta name="description" content="Veridian is a free AI study planner with spaced repetition, learning guides, practice quizzes, and structured Journeys for AP, college, and pre-med." />
    <meta name="robots" content="index,follow" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Veridian" />

    <meta property="og:description" content="Turn your notes into structured study Journeys with AI guides, quizzes, flashcards, and a Due Today plan." />

    <link rel="canonical" href="https://veridianstudy.com/" />
    <title>Veridian</title>
  </head>
  <body>
    <script>
      (function () {
        try {
          var prefs = JSON.parse(localStorage.getItem('veridian_preferences') || '{}');
          var dark = prefs.themeDark !== false;
          document.documentElement.classList.toggle('dark', dark);
          document.documentElement.classList.toggle('light', !dark);
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
